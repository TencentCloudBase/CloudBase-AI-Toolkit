<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权完成 - 企业 AI 开发平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #333;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 420px;
      max-width: 94vw;
      text-align: center;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .desc { color: #666; font-size: 14px; margin-bottom: 16px; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-detail { font-size: 13px; color: #888; margin-top: 8px; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-detail { font-size: 13px; color: #dc2626; margin-top: 8px; }
    .btn-close {
      display: inline-block; padding: 10px 32px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; cursor: pointer; text-decoration: none;
      margin-top: 24px;
    }
    .footer { margin-top: 32px; font-size: 12px; color: #aaa; }

    .status-step {
      text-align: left; margin: 24px 0; padding: 16px;
      background: #f9fafb; border-radius: 8px;
    }
    .status-step .step { font-size: 13px; color: #555; padding: 6px 0; display: flex; align-items: center; gap: 8px; }
    .status-step .step.done { color: #16a34a; }
    .status-step .step.active { color: #2563eb; font-weight: 500; }
    .status-step .step .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .step.done .dot { background: #16a34a; }
    .step.active .dot { background: #2563eb; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="card" id="root">
    <div class="spinner"></div>
    <h1>正在验证身份...</h1>
    <p class="desc">请稍候，正在完成授权流程</p>
    <div class="status-step" id="steps">
      <div class="step active"><span class="dot"></span> 验证企业身份</div>
      <div class="step"><span class="dot"></span> 配置开发环境</div>
      <div class="step"><span class="dot"></span> 授权完成</div>
    </div>
  </div>

  <!-- CloudBase Web SDK -->
  <script src="https://imgcache.qq.com/qcloud/tcb/js-sdk/2.x.x/cloudbase.js"></script>
  <script>
    let authApp = null;
    let authInstance = null;

    function updateStep(index) {
      const steps = document.querySelectorAll('#steps .step');
      steps.forEach((el, i) => {
        el.className = 'step';
        if (i < index) el.classList.add('done');
        else if (i === index) el.classList.add('active');
      });
    }

    async function initCloudBase() {
      const configRes = await fetch('/auth/config');
      const config = await configRes.json();
      if (!config.envId || !config.publishableKey) {
        throw new Error('授权服务配置不完整，请联系管理员');
      }
      authApp = cloudbase.init({
        env: config.envId,
        region: config.region || 'ap-shanghai',
        accessKey: config.publishableKey,
        auth: { detectSessionInUrl: true },
      });
      authInstance = authApp.auth({ persistence: 'local' });
    }

    async function handleCallback() {
      try {
        // 步骤 1：初始化 SDK（detectSessionInUrl: true 会自动处理 URL 中的 code 参数）
        await initCloudBase();
        updateStep(1);

        // 步骤 2：获取 CloudBase Session（等待 SDK 完成 code → session 交换）
        // auth.onAuthStateChange 可监听认证状态变化
        const sessionResult = await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('认证超时，请重试')), 30000);

          authInstance.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
              clearTimeout(timeout);
              resolve(session);
            }
          });

          // 如果 session 已就绪，直接获取
          setTimeout(async () => {
            const { data, error } = await authInstance.getSession();
            clearTimeout(timeout);
            if (data?.session) resolve(data.session);
            else reject(new Error(error?.message || '无法获取登录状态'));
          }, 2000);
        });

        const cloudbaseUid = sessionResult.user?.id;
        if (!cloudbaseUid) throw new Error('无法获取用户身份');

        // 从 sessionStorage 读取设备码
        const userCode = sessionStorage.getItem('pending_user_code');
        if (!userCode) {
          throw new Error('缺少设备码信息，请重新在授权页面操作');
        }

        updateStep(2);

        // 步骤 3：通知服务端完成设备码授权
        const verifyRes = await fetch('/auth/verify-cloudbase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_code: userCode, cloudbase_uid: cloudbaseUid }),
        });

        const verifyResult = await verifyRes.json();
        if (!verifyRes.ok) throw new Error(verifyResult.error_description || '授权失败');

        // 清理 sessionStorage
        sessionStorage.removeItem('pending_user_code');

        updateStep(3);

        // 显示成功页面
        document.getElementById('root').innerHTML = `
          <div class="success-icon">✅</div>
          <h1>授权成功</h1>
          <p class="desc">您的设备已成功绑定企业账号</p>
          <div class="status-step">
            <div class="step done"><span class="dot"></span> 企业身份已验证</div>
            <div class="step done"><span class="dot"></span> 开发环境已就绪</div>
            <div class="step done"><span class="dot"></span> 授权已完成</div>
          </div>
          ${verifyResult.env_id ? `<p class="success-detail">环境 ID: ${verifyResult.env_id}</p>` : ''}
          <p class="desc" style="margin-top:16px;font-size:13px;color:#888;">
            现在可以返回终端/IDE 继续操作
          </p>
          <button class="btn-close" onclick="window.close()">关闭页面</button>
          <div class="footer">企业 AI 开发平台 &middot; 云开发 CloudBase</div>
        `;
      } catch (e) {
        console.error('Callback error:', e);
        document.getElementById('root').innerHTML = `
          <div class="error-icon">❌</div>
          <h1>授权失败</h1>
          <p class="desc">${e.message}</p>
          <p class="error-detail">请关闭此页面，在终端重新执行 tcb login 后重试</p>
          <button class="btn-close" onclick="window.close()">关闭页面</button>
          <div class="footer">企业 AI 开发平台 &middot; 云开发 CloudBase</div>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', handleCallback);
  </script>
</body>
</html>
