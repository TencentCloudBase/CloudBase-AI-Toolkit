name: Open Plugin Spec Check

on:
  pull_request:
    paths:
      - 'plugin/cloudbase/**'
      - 'scripts/build-open-plugin-spec.mjs'
      - '.github/workflows/open-plugin-spec-check.yml'
  push:
    branches:
      - main
    paths:
      - 'plugin/cloudbase/**'
      - 'scripts/build-open-plugin-spec.mjs'
      - '.github/workflows/open-plugin-spec-check.yml'

jobs:
  spec-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Check Open Plugin Spec artifacts are up to date
        run: |
          node scripts/build-open-plugin-spec.mjs --check

      - name: Verify plugins CLI can discover the plugin
        working-directory: plugin/cloudbase
        run: |
          npx -y plugins discover . --remote
