name: Publish MCP Package to pkg.pr.new

on:
  # 在推送和PR时触发
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 也支持手动触发
  workflow_dispatch:

jobs:
  # 构建和发布到pkg.pr.new
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable
        
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'mcp/package-lock.json'
          
      - name: Install root dependencies (for build-allinone-skill scripts)
        run: npm ci --ignore-scripts

      - name: Install dependencies
        run: |
          cd mcp
          npm ci

      - name: Build package
        run: |
          cd mcp
          npm run build
      - name: Test package
        # WARNING: Secrets are only available for non-fork PRs due to GitHub's built-in protection.
        # We still add explicit condition for defense in depth.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          cd mcp
          npm run test
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENTCLOUD_SECRETID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENTCLOUD_SECRETKEY }}
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}

      - name: Test hooks
        run: npm run test:hooks
          
      - name: Publish to pkg.pr.new
        run: |
          cd mcp
          npx pkg-pr-new publish --comment=off 